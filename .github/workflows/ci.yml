name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  quality:
    name: Lint + Security + Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint (ruff)
        run: ruff check app/ tests/

      - name: Security SAST (bandit)
        run: python -m bandit -r app/ -ll -q

      - name: Dependency audit (pip-audit)
        run: python -m pip_audit --ignore-vuln CVE-2026-3219

      - name: Tests + Coverage
        env:
          TELEGRAM_BOT_TOKEN: "0000000000:fake-token-ci"
          ANTHROPIC_API_KEY: "sk-ant-fake-key-ci"
          OPENAI_API_KEY: "sk-fake-key-ci"
        run: |
          pytest tests/ -v \
            --cov=app \
            --cov-report=term-missing \
            --cov-fail-under=75
